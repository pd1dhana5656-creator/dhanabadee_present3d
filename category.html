<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ประเภทสินค้า — Product Catalog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-category">

  <!-- ==================== HEADER ==================== -->
  <header class="site-header">
    <div class="logo">
      <img src="assets/Logo_Dhana.svg" alt="Dhana Logo" />
    </div>

    <!-- Breadcrumb: Home / [กลุ่มสินค้า] -->
    <nav class="breadcrumb" aria-label="breadcrumb">
      <a class="breadcrumb__link" href="index.html">Home</a>
      <span class="breadcrumb__sep">/</span>
      <!--
        JS จะเติม text ของ breadcrumb นี้
        ตาม ?group= ใน URL  (dhana → "Dhana" / dm → "DM")
      -->
      <span class="breadcrumb__current" id="js-groupLabel">ประเภทสินค้า</span>
    </nav>
  </header>
  <!-- /HEADER -->

  <!-- ==================== PAGE NAV ==================== -->
  <!--
    ปุ่ม Back กลับไปหน้า Home
    (ย้อนกลับได้เฉพาะจากหน้านี้เท่านั้น)
  -->
  <div class="page-nav">
    <a class="btn btn-ghost" href="index.html">← กลับหน้าหลัก</a>
    <h1 class="page-nav__title" id="js-categoryHeading">ประเภทสินค้า</h1>
  </div>
  <!-- /PAGE NAV -->

  <!-- ==================== MAIN : ประเภทสินค้า ==================== -->
  <!--
    JS (category.js) จะ:
    1. อ่าน ?group= จาก URL
    2. โหลด CSV ของ sheet นั้น (dhana หรือ dm)
    3. ดึง unique values ของคอลัมน์ "ประเภทสินค้า"
    4. render type-card ซ้ำตามจำนวนประเภทที่มี (สูงสุด ~15 ประเภท)
  -->
  <main class="category-main">

    <!-- กริดประเภทสินค้า — render โดย JS -->
    <section class="type-grid" id="js-typeGrid">

      <!--
        [MOCK] ตัวอย่างโครงสร้าง type-card 1 ใบ
        JS จะ render แบบนี้ซ้ำตามจำนวน "ประเภทสินค้า" ใน Sheets
        href → product-list.html?group=dhana&type=[ประเภทสินค้า]
      -->
      <a class="type-card" href="product-list.html?group=dhana&type=Vase">
        <div class="type-card__icon-area">
          <!-- ไอคอนหรือ thumbnail ของประเภทสินค้า -->
          <div class="type-card__placeholder-img">[icon/รูป Vase]</div>
        </div>
        <span class="type-card__label">Vase</span>
      </a>

      <!-- [MOCK] ตัวอย่างเพิ่มเติม -->
      <a class="type-card" href="product-list.html?group=dhana&type=Decoration">
        <div class="type-card__icon-area">
          <div class="type-card__placeholder-img">[icon/รูป Decoration]</div>
        </div>
        <span class="type-card__label">Decoration</span>
      </a>

      <a class="type-card" href="product-list.html?group=dhana&type=Mini+Vase">
        <div class="type-card__icon-area">
          <div class="type-card__placeholder-img">[icon/รูป Mini Vase]</div>
        </div>
        <span class="type-card__label">Mini Vase</span>
      </a>

      <!-- ... JS จะ render ที่เหลือโดยอัตโนมัติ ... -->

    </section>

    <!-- แสดง loading ระหว่างดึงข้อมูล -->
    <div class="loading-state hidden" id="js-loading">
      <span>[กำลังโหลดข้อมูล...]</span>
    </div>

    <!-- แสดงเมื่อ error -->
    <div class="error-state hidden" id="js-error">
      <span>[ไม่สามารถโหลดข้อมูลได้ กรุณาลองใหม่]</span>
    </div>

  </main>
  <!-- /MAIN -->

  <!-- ==================== FOOTER ==================== -->
  <footer class="site-footer">
    <p class="site-footer__copy">&copy; 2025 [Brand Name]. All rights reserved.</p>
  </footer>
  <!-- /FOOTER -->

  <!--
    sheets.js  — helper โหลด/parse CSV จาก Google Sheets
    category.js — logic เฉพาะหน้านี้
  -->
  <script type="module" src="js/sheets.js"></script>
  <script type="module" src="js/category.js"></script>
</body>
</html>
